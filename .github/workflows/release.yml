name: Release on version bump

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2

      - name: Create release if version changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          CURRENT=$(node -p "require('./package.json').version")

          if git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null; then
            PREVIOUS=$(node -p "require('/tmp/prev-package.json').version")
          else
            PREVIOUS=""
          fi

          echo "Previous version: ${PREVIOUS:-<none>}"
          echo "Current version:  $CURRENT"

          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "Version unchanged — no release."
            exit 0
          fi

          TAG="v$CURRENT"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi

          echo "Creating release $TAG"
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
