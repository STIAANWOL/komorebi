name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top level: nothing gets write access by default. The
# deploy job below opts into exactly the two scopes it needs. No secrets or
# personal access tokens are ever used — deployment runs entirely on the
# ephemeral, auto-expiring GITHUB_TOKEN via OIDC.
permissions:
  contents: read

# Only one Pages deployment at a time; don't cancel an in-progress run so a
# deploy can't be left half-applied.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # The build runs third-party dependency code; give it read-only access and
    # never expose the Pages/OIDC token to it.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        env:
          # Served from https://stiaanwol.github.io/komorebi/ — must match the repo name.
          STORYBOOK_BASE_PATH: /komorebi/
        run: pnpm build-storybook

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Permissions granted only here, not to the build job.
    permissions:
      pages: write # publish to GitHub Pages
      id-token: write # mint the OIDC token deploy-pages exchanges for a deploy token
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
